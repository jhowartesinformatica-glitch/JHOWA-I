<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>JHOW A-I</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/particles.js"></script>

<style>

body{
margin:0;
background:#050b14;
font-family:Arial;
color:white;
overflow:hidden;
}

#particles-js{
position:fixed;
width:100%;
height:100%;
z-index:-1;
}

/* CENTRAL */

.container{

height:100vh;
display:flex;
align-items:center;
justify-content:center;

}

/* JANELA */

.window{

width:900px;
background:#0f1724;
border-radius:10px;
box-shadow:0 0 40px rgba(0,170,255,0.4);

}

/* BARRA */

.titlebar{

background:#020617;
padding:10px;
display:flex;
align-items:center;
justify-content:space-between;

border-top-left-radius:10px;
border-top-right-radius:10px;

}

.buttons{

display:flex;
gap:8px;

}

.btn{

width:12px;
height:12px;
border-radius:50%;

}

.red{background:#ff5f56;}
.yellow{background:#ffbd2e;}
.green{background:#27c93f;}

/* CONTEUDO */

.content{

padding:80px;
text-align:center;

}

.logo{

font-family:'Bebas Neue';
font-size:90px;

background:linear-gradient(90deg,#1da1ff,#004cff);
-webkit-background-clip:text;
color:transparent;

}

.subtitle{

opacity:0.8;
font-size:20px;

}

.enter{

margin-top:40px;

padding:12px 30px;

border:none;

background:#1da1ff;

color:white;

font-size:18px;

border-radius:25px;

cursor:pointer;

}

</style>

</head>

<body>

<div id="particles-js"></div>

<div class="container">

<div class="window">

<div class="titlebar">

<div class="buttons">

<div class="btn red"></div>
<div class="btn yellow"></div>
<div class="btn green"></div>

</div>

<div>JHOW A-I SYSTEM</div>

</div>

<div class="content">

<div class="logo">JHOW A-I</div>

<p class="subtitle">
Tecnologia avançada e desenvolvimento de softwares inteligentes
</p>

<button class="enter">
ENTRAR NO SISTEMA
</button>

</div>

</div>

</div>

<script>

particlesJS("particles-js",{

particles:{
number:{value:90},
size:{value:3},
move:{speed:2},
line_linked:{enable:true,opacity:0.2}
}

});

</script>

</body>
</html>
