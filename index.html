<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>JHOW A-I System</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">

<style>

body{
margin:0;
background:black;
color:#00ff9c;
font-family:monospace;
overflow:hidden;
}

/* TELA BOOT */

#boot{

position:fixed;
width:100%;
height:100%;

background:black;

padding:40px;

}

.line{
margin:5px 0;
opacity:0;
animation:show 1s forwards;
}

@keyframes show{
to{opacity:1;}
}

/* PROGRESS BAR */

.progress{

width:400px;
height:10px;
border:1px solid #00ff9c;
margin-top:20px;

}

.bar{

height:100%;
width:0%;
background:#00ff9c;

animation:load 5s linear forwards;

}

@keyframes load{

to{width:100%;}

}

/* SITE */

#site{

display:none;
height:100vh;

background:linear-gradient(120deg,#020617,#020d1f);

color:white;

text-align:center;

padding-top:150px;

font-family:Arial;

}

.logo{

font-family:'Bebas Neue';

font-size:120px;

background:linear-gradient(90deg,#1da1ff,#004cff);

-webkit-background-clip:text;

color:transparent;

}

</style>

</head>

<body>

<div id="boot">

<div class="line" style="animation-delay:0s">Inicializando núcleo JHOW A-I...</div>

<div class="line" style="animation-delay:1s">Carregando módulos de inteligência...</div>

<div class="line" style="animation-delay:2s">Conectando rede neural...</div>

<div class="line" style="animation-delay:3s">Verificando sistema...</div>

<div class="line" style="animation-delay:4s">Sistema pronto.</div>

<div class="progress">
<div class="bar"></div>
</div>

</div>


<div id="site">

<div class="logo">JHOW A-I</div>

<p>Tecnologia avançada e softwares inteligentes</p>

</div>


<script>

setTimeout(function(){

document.getElementById("boot").style.display="none";
document.getElementById("site").style.display="block";

},5500);

</script>

</body>
</html>
