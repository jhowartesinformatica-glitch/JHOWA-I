<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JHOW ARTES INFORMATICA</title>
    <style>
        body { font-family: sans-serif; margin: 0; background: #f0f0f0; color: #333; }
        nav { background: #1a1a1a; color: white; padding: 15px; text-align: center; font-weight: bold; }
        .hero { 
            background: #007bff; color: white; padding: 50px 20px; text-align: center;
            clip-path: polygon(0 0, 100% 0, 100% 88%, 0 100%); /* O trapézio baixo que você gosta */
        }
        .container { 
            max-width: 800px; margin: -25px auto 50px; background: white; 
            padding: 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
        }
        .btn-whatsapp {
            display: inline-block; background: #25d366; color: white; 
            padding: 12px 25px; text-decoration: none; border-radius: 50px; font-weight: bold;
        }
        footer { text-align: center; padding: 20px; color: #777; font-size: 0.8em; }
    </style>
</head>
<body>
    <nav>JHOW ARTES INFORMATICA</nav>
    <div class="hero">
        <h1>Site Oficial no Ar</h1>
        <p>Soluções em informática e artes digitais.</p>
    </div>
    <div class="container">
        <h2>Seja bem-vindo!</h2>
        <p>Este site é 100% gratuito e mantido pelo GitHub Pages.</p>
        <p>Precisa de suporte ou artes personalizadas?</p>
        <br>
        <a href="#" class="btn-whatsapp">Chamar no WhatsApp</a>
    </div>
    <footer>© 2026 - Desenvolvido por JHOW</footer>
</body>
</html>
